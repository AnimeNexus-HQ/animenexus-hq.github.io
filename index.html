<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeNexus - اكتشف شخصيتك الأنميوية</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='48' font-size='48'>⚡</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.6s ease;
        }
        body.welcome-bg { background: radial-gradient(circle at 30% 20%, #1a1040 0%, #0a0a0f 70%); }
        body.quiz-bg { background: radial-gradient(circle at 70% 50%, #0f1a2e 0%, #050510 70%); }
        body.result-bg { background: radial-gradient(circle at 50% 50%, #2a1635 0%, #0a0a0f 70%); }
        body.loading-bg { background: radial-gradient(circle at 50% 50%, #0f0f1a 0%, #050510 70%); }

        .container {
            width: 100%;
            max-width: 750px;
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(100, 50, 255, 0.3);
            border: 1px solid rgba(150, 100, 255, 0.25);
            transition: all 0.3s ease;
        }
        h1, h2 {
            text-align: center;
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 1.5px;
        }
        h1 { font-size: 2.5rem; }
        h2 { font-size: 1.6rem; margin-top: 8px; }
        .screen {
            display: none;
            animation: fadeSlide 0.45s ease forwards;
        }
        .screen.active { display: block; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #8b5cf6;
            color: #e0e0ff;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .btn:hover { background: #8b5cf6; color: #fff; box-shadow: 0 0 20px #8b5cf6aa; transform: scale(1.02); }
        .btn.small { width: auto; display: inline-block; padding: 10px 20px; margin: 5px; font-size: 0.9rem; }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 18px 0;
        }
        .quiz-question {
            margin: 25px 0;
            padding: 18px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border-right: 4px solid #8b5cf6;
        }
        .question-text {
            font-size: 1.15rem;
            margin-bottom: 18px;
            font-weight: 600;
        }
        .question-counter {
            text-align: center;
            color: #b0b0ff;
            margin: 8px 0 16px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2a40;
            border-radius: 20px;
            margin: 15px 0 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8b5cf6, #c084fc);
            border-radius: 20px;
            transition: width 0.4s ease;
        }
        .result-card {
            text-align: center;
            background: rgba(0,0,0,0.35);
            border-radius: 24px;
            padding: 30px 18px;
            margin-top: 20px;
            border: 1px solid #4c1d95;
        }
        .result-card img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #8b5cf6;
            box-shadow: 0 0 35px #8b5cf6aa;
            margin: 15px auto;
            display: block;
        }
        .mbti-badge {
            display: inline-block;
            background: #8b5cf6;
            color: white;
            padding: 8px 28px;
            border-radius: 40px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin: 10px 0;
        }
        .real-desc {
            font-size: 1.3rem;
            color: #f0e68c;
            margin: 5px 0 15px;
            font-weight: 600;
        }
        .character-name {
            font-size: 2.1rem;
            background: linear-gradient(135deg, #f0e68c, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin: 10px 0 5px;
        }
        .share-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
        .share-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #8b5cf6;
            color: #e0e0ff;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 1.1rem;
        }
        .share-btn:hover { background: #8b5cf6; color: white; }
        .nav-buttons { display: flex; gap: 10px; justify-content: space-between; margin-top: 15px; flex-wrap: wrap; }
        .hidden-canvas { display: none; }
        .loading-spinner {
            width: 60px; height: 60px;
            border: 6px solid #2a2a40;
            border-top: 6px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .small-note { color: #aaa; font-size: 0.8rem; margin: 6px 0; }
        .flex-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .name-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid #8b5cf6;
            border-radius: 25px;
            padding: 12px 18px;
            color: white;
            font-size: 1rem;
            width: 80%;
            max-width: 300px;
            margin: 10px auto;
            text-align: center;
        }
        .upload-area {
            border: 2px dashed #8b5cf6;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover { background: rgba(139, 92, 246, 0.1); }
        .upload-area input { display: none; }
        .ad-box {
            margin-top: 25px;
            padding: 15px;
            border: 1px dashed #ffd70088;
            border-radius: 16px;
            background: rgba(255, 215, 0, 0.03);
            text-align: center;
        }
        .ad-box p { color: #ffd700; margin-bottom: 8px; }
        @media (max-width: 500px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 1.8rem; }
            .btn { font-size: 0.95rem; padding: 12px; }
        }
    </style>
</head>

        // ======================= الدوال المساعدة =======================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function calculateMBTI(scores) {
            const O = scores[0], C = scores[1], E = scores[2], A = scores[3], N = scores[4];
            let mbti = "";
            mbti += (E >= 0) ? "E" : "I";
            mbti += (O >= 0) ? "N" : "S";
            mbti += (A >= 0) ? "F" : "T";
            mbti += (C >= 0) ? "J" : "P";
            return mbti;
        }

        function distance(a, b) {
            return Math.sqrt(a.reduce((sum, val, i) => sum + Math.pow(val - b[i], 2), 0));
        }

        function getNextSerial() {
            let serial = localStorage.getItem('animenexus_serial');
            if (!serial) serial = 1000;
            serial = parseInt(serial) + 1;
            localStorage.setItem('animenexus_serial', serial);
            return serial;
        }

        // متغيرات عامة
        let userUploadedImage = null;
        let userName = "";

        const state = {
            step: 'anime',
            selectedAnime: null,
            selectedGender: null,
            currentQuestion: 0,
            answers: [],
            scores: [0,0,0,0,0],
            shuffledQuestions: []
        };

        const app = document.getElementById('app');
        const body = document.body;
        const canvas = document.getElementById('card-canvas');
        const ctx = canvas.getContext('2d');

        function setBodyClass(cls) { body.className = cls; }

        function render() {
            app.innerHTML = '';
            if (state.step === 'anime') renderAnimeSelection();
            else if (state.step === 'gender') renderGenderSelection();
            else if (state.step === 'quiz') renderQuiz();
            else if (state.step === 'loading') renderLoading();
            else if (state.step === 'result') renderResult();
        }

        function renderAnimeSelection() {
            setBodyClass('welcome-bg');
            const screen = document.createElement('div');
            screen.className = 'screen active';
            screen.innerHTML = `
                <h1>AnimeNexus</h1>
                <h2>اختر عالم الأنمي</h2>
                <div class="options-grid" id="anime-grid"></div>
                <div style="text-align:center;margin-top:25px;">
                    <a class="btn small" href="https://t.me/kiotaka4108" target="_blank" style="display:inline-block;width:auto;">💬 تواصل معنا</a>
                </div>`;
            const grid = screen.querySelector('#anime-grid');
            for (let animeKey in animeData) {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.textContent = animeKey;
                btn.onclick = () => { state.selectedAnime = animeKey; state.step = 'gender'; render(); };
                grid.appendChild(btn);
            }
            app.appendChild(screen);
        }

        function renderGenderSelection() {
            setBodyClass('welcome-bg');
            const screen = document.createElement('div');
            screen.className = 'screen active';
            screen.innerHTML = `
                <h2>اختر جنسك</h2>
                <div class="flex-row">
                    <button class="btn" id="male-btn">ذكر</button>
                    <button class="btn" id="female-btn">أنثى</button>
                </div>
                <p style="text-align:center;color:#aaa;">العالم: ${state.selectedAnime}</p>
                <input type="text" class="name-input" id="name-input" placeholder="اسمك (اختياري "ليس ضرورياً اسمك الحقيقي")" value="${userName}">`;
            screen.querySelector('#male-btn').onclick = () => {
                userName = screen.querySelector('#name-input').value.trim();
                state.selectedGender = 'male';
                startQuiz();
            };
            screen.querySelector('#female-btn').onclick = () => {
                userName = screen.querySelector('#name-input').value.trim();
                state.selectedGender = 'female';
                startQuiz();
            };
            app.appendChild(screen);
        }

        function startQuiz() {
            state.shuffledQuestions = shuffleArray([...questions]);
            state.step = 'quiz';
            state.currentQuestion = 0;
            state.answers = [];
            state.scores = [0,0,0,0,0];
            render();
        }

        function renderQuiz() {
            setBodyClass('quiz-bg');
            const q = state.shuffledQuestions[state.currentQuestion];
            const screen = document.createElement('div');
            screen.className = 'screen active';
            const progress = ((state.currentQuestion / state.shuffledQuestions.length) * 100).toFixed(0);
            screen.innerHTML = `
                <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                <div class="question-counter">السؤال ${state.currentQuestion + 1} من ${state.shuffledQuestions.length}</div>
                <div class="quiz-question">
                    <div class="question-text">${state.currentQuestion + 1}. ${q.text}</div>
                    <div class="options-grid" id="opts-grid"></div>
                </div>
                <div class="nav-buttons">
                    <button class="btn small" id="prev-btn" ${state.currentQuestion === 0 ? 'disabled style="opacity:0.4;"' : ''}>⬅ السابق</button>
                    <span style="color:#aaa;">اختر إجابة</span>
                </div>`;
            const optsGrid = screen.querySelector('#opts-grid');
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn opt';
                btn.textContent = `${['أ','ب','ج','د'][idx]}) ${opt.text}`;
                btn.onclick = () => handleAnswer(idx);
                optsGrid.appendChild(btn);
            });
            screen.querySelector('#prev-btn').onclick = () => {
                if (state.currentQuestion > 0) {
                    const prevScores = state.shuffledQuestions[state.currentQuestion - 1].options[state.answers.pop()].scores;
                    prevScores.forEach((s, i) => state.scores[i] -= s);
                    state.currentQuestion--;
                    render();
                }
            };
            app.appendChild(screen);
        }

        function handleAnswer(idx) {
            const optScores = state.shuffledQuestions[state.currentQuestion].options[idx].scores;
            optScores.forEach((s, i) => state.scores[i] += s);
            state.answers.push(idx);
            if (state.currentQuestion < state.shuffledQuestions.length - 1) {
                state.currentQuestion++;
                render();
            } else {
                state.step = 'loading';
                render();
                setTimeout(() => {
                    state.step = 'result';
                    render();
                }, 1500);
            }
        }

        function renderLoading() {
            setBodyClass('loading-bg');
            const screen = document.createElement('div');
            screen.className = 'screen active';
            screen.innerHTML = `
                <h2>⏳ جارٍ تحليل شخصيتك...</h2>
                <div class="loading-spinner"></div>
                <p style="text-align:center;color:#aaa;">يتم مقارنة إجاباتك بأبطال الأنمي</p>`;
            app.appendChild(screen);
        }

        function renderResult() {
            setBodyClass('result-bg');
            const characters = animeData[state.selectedAnime][state.selectedGender];
            let bestMatch = null, bestDist = Infinity;
            characters.forEach(char => {
                const dist = distance(state.scores, char.scores);
                if (dist < bestDist) { bestDist = dist; bestMatch = char; }
            });
            const mbti = calculateMBTI(state.scores);
            const realDesc = mbtiRealDesc[mbti] || "شخصية فريدة";
            const serial = getNextSerial();
            const greeting = userName ? `أهلاً ${userName}، ` : "";
            const shareText = `${greeting} نمط شخصيتي: ${mbti} (${realDesc})\nمن عالم ${state.selectedAnime} أشبه: ${bestMatch.name}\nبطاقة نتيجتي: #${serial}\nاكتشف شخصيتك: ${window.location.href}`;
            const encodedShare = encodeURIComponent(shareText);

            const screen = document.createElement('div');
            screen.className = 'screen active';
            screen.innerHTML = `
                <h2>نتيجتك</h2>
                <div class="result-card" id="result-card-content">
                    ${userName ? `<p style="color:#f0e68c;margin-bottom:10px;">أهلاً بك يا ${userName}!</p>` : ''}
                    <div class="mbti-badge">${mbti}</div>
                    <div class="real-desc">${realDesc}</div>
                    <img src="${bestMatch.img}" alt="${bestMatch.name}" crossorigin="anonymous" id="char-img">
                    <div class="character-name">${bestMatch.name}</div>
                    <p>من عالم <strong>${state.selectedAnime}</strong></p>
                    <p class="small-note">الرقم التسلسلي: #${serial}</p>
                    
                    <div class="upload-area" id="upload-area">
                        📷 اضغط هنا لرفع صورتك الشخصية (اختياري)
                        <input type="file" id="image-upload" accept="image/*">
                    </div>
                    <img id="user-preview" style="width:80px;height:80px;border-radius:50%;object-fit:cover;display:none;margin:10px auto;border:2px solid #8b5cf6;">

                    <div class="share-buttons">
                        <button class="share-btn" id="copy-btn"> نسخ</button>
                        <a class="share-btn" href="https://wa.me/?text=${encodedShare}" target="_blank"> واتساب</a>
                        <a class="share-btn" href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodedShare}" target="_blank"> تلغرام</a>
                        <a class="share-btn" href="https://twitter.com/intent/tweet?text=${encodedShare}" target="_blank"> تويتر</a>
                    </div>
                    <button class="btn small" id="download-card-btn" style="margin-top:15px;"> تحميل بطاقة النتيجة</button>
                    <div style="margin-top:20px;">
                        <a class="btn small" href="https://t.me/kiotaka4108" target="_blank">💬 تواصل معنا</a>
                    </div>
                </div>
                <button class="btn" id="restart-btn" style="margin-top:25px;"> إعادة الاختبار</button>`;

            screen.querySelector('#copy-btn').onclick = () => {
                navigator.clipboard.writeText(shareText).then(() => alert('تم نسخ النتيجة!'));
            };
            screen.querySelector('#restart-btn').onclick = () => {
                state.step = 'anime'; state.selectedAnime = null; state.selectedGender = null;
                state.scores = [0,0,0,0,0]; state.answers = []; userUploadedImage = null; userName = ""; render();
            };
            const uploadArea = screen.querySelector('#upload-area');
            const fileInput = screen.querySelector('#image-upload');
            const userPreview = screen.querySelector('#user-preview');
            uploadArea.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        userUploadedImage = ev.target.result;
                        userPreview.src = userUploadedImage;
                        userPreview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            };
            screen.querySelector('#download-card-btn').onclick = () => {
                generateCard(bestMatch, mbti, realDesc, serial);
            };
            app.appendChild(screen);
        }

        function generateCard(character, mbti, realDesc, serial) {
            canvas.width = 600;
            canvas.height = 800;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0, 0, 0, 800);
            grad.addColorStop(0, '#1a1040');
            grad.addColorStop(0.5, '#0f1a2e');
            grad.addColorStop(1, '#0a0a0f');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 600, 800);
            ctx.strokeStyle = '#8b5cf6';
            ctx.lineWidth = 6;
            ctx.strokeRect(15, 15, 570, 770);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Tahoma';
            ctx.textAlign = 'center';
            ctx.fillText('AnimeNexus', 300, 70);
            ctx.font = '20px Tahoma';
            ctx.fillStyle = '#c084fc';
            ctx.fillText('بطاقة اكتشاف الشخصية', 300, 105);

            if (userUploadedImage) {
                const img = new Image();
                img.src = userUploadedImage;
                img.onload = () => {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(300, 200, 70, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(img, 230, 130, 140, 140);
                    ctx.restore();
                    drawRemaining();
                };
            } else {
                ctx.fillStyle = '#2a2a40';
                ctx.beginPath();
                ctx.arc(300, 200, 70, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8b5cf6';
                ctx.font = '40px Tahoma';
                ctx.fillText('?', 300, 215);
                drawRemaining();
            }

            function drawRemaining() {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 50px Tahoma';
                ctx.fillText(mbti, 300, 330);
                ctx.font = '22px Tahoma';
                ctx.fillStyle = '#f0e68c';
                ctx.fillText(realDesc, 300, 370);

                const charImg = new Image();
                charImg.crossOrigin = 'anonymous';
                charImg.src = character.img;
                charImg.onload = () => {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(300, 480, 60, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(charImg, 240, 420, 120, 120);
                    ctx.restore();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 30px Tahoma';
                    ctx.fillText(character.name, 300, 570);
                    ctx.font = '18px Tahoma';
                    ctx.fillStyle = '#ccc';
                    ctx.fillText(`من عالم ${state.selectedAnime}`, 300, 605);
                    ctx.font = '16px Tahoma';
                    ctx.fillStyle = '#ffd700';
                    ctx.fillText(`الرقم التسلسلي: #${serial}`, 300, 650);
                    ctx.font = '16px Tahoma';
                    ctx.fillStyle = '#aaa';
                    ctx.fillText('اكتشف شخصيتك على AnimeNexus', 300, 700);
                    const link = document.createElement('a');
                    link.download = `animenexus-result-${serial}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                };
                charImg.onerror = () => {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 30px Tahoma';
                    ctx.fillText(character.name, 300, 500);
                    ctx.font = '18px Tahoma';
                    ctx.fillStyle = '#ccc';
                    ctx.fillText(`من عالم ${state.selectedAnime}`, 300, 540);
                    const link = document.createElement('a');
                    link.download = `animenexus-result-${serial}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                };
            }
        }

        render();
    </script>
