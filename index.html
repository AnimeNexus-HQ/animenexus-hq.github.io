<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #020617; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* 1. تأثير الدخول (بدون صور) */
        #splash {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center;
            animation: hideSplash 3s ease-out forwards;
        }
        @keyframes hideSplash { 70% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
        .logo-text { color: #8b5cf6; font-size: 3rem; font-weight: bold; text-shadow: 0 0 15px #8b5cf6; }

        /* 2. البطاقة المحدثة */
        .id-card {
            width: 450px; background: #e2e8f0; color: #000;
            border-radius: 10px; padding: 20px; border: 3px solid #64748b;
            margin-top: 50px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .header { border-bottom: 2px solid #000; padding-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- مشهد الدخول -->
    <div id="splash"><div class="logo-text">SOLO LEVELING</div></div>

    <!-- البطاقة المحدثة ببياناتك -->
    <div class="id-card">
        <div class="header">هوية الصياد - Hunter License</div>
        <p>الرقم: 9988776655</p>
        <p>الاسم: [اكتب اسمك هنا]</p>
        <p>الرتبة: S</p>
    </div>

</body>
</html>
