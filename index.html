<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 30% 20%, #1a1040 0%, #0a0a0f 70%);
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(100, 50, 255, 0.3);
            border: 1px solid rgba(150, 100, 255, 0.25);
            transition: all 0.3s ease;
        }
        h1, h2 {
            text-align: center;
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        h1 { font-size: 2.8rem; }
        h2 { font-size: 1.8rem; margin-top: 10px; }
        .screen {
            display: none;
            animation: fadeSlide 0.5s ease forwards;
        }
        .screen.active { display: block; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #8b5cf6;
            color: #e0e0ff;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .btn:hover {
            background: #8b5cf6;
            color: #fff;
            box-shadow: 0 0 25px #8b5cf6aa;
            transform: scale(1.02);
        }
        .btn.selected {
            background: #7c3aed;
            border-color: #c084fc;
            box-shadow: 0 0 30px #a78bfa;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .quiz-question {
            margin: 35px 0;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            border-right: 5px solid #8b5cf6;
        }
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #2a2a40;
            border-radius: 20px;
            margin: 25px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8b5cf6, #c084fc);
            border-radius: 20px;
            transition: width 0.4s ease;
        }
        .result-card {
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 35px 20px;
            margin-top: 20px;
            border: 1px solid #4c1d95;
        }
        .result-card img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #8b5cf6;
            box-shadow: 0 0 35px #8b5cf6aa;
            margin: 20px auto;
            display: block;
        }
        .mbti-badge {
            display: inline-block;
            background: #8b5cf6;
            color: white;
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin: 15px 0;
        }
        .character-name {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #f0e68c, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin: 15px 0;
        }
        .small-note {
            color: #aaa;
            font-size: 0.85rem;
            margin: 8px 0;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        @media (max-width: 500px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 2rem; }
            .btn { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>

        // تحويل MBTI
        function calculateMBTI(scores) {
            const O = scores[0], C = scores[1], E = scores[2], A = scores[3], N = scores[4];
            let mbti = "";
            mbti += (E >= 0) ? "E" : "I";
            mbti += (O >= 0) ? "N" : "S";
            mbti += (A >= 0) ? "F" : "T";
            mbti += (C >= 0) ? "J" : "P";
            return mbti;
        }

            const q = questions[state.currentQuestion];

            screen.className = 'screen active';

                    <div class="question-text">${state.currentQuestion + 1}. ${q.text}</div>

                    <div class="character-name">${bestMatch.name}</div>
                    <p>من عالم <strong>${state.selectedAnime}</strong></p>
                    <button class="btn" id="restart-btn">🔁 إعادة الاختبار</button>
                </div>
            `;
            screen.querySelector('#restart-btn').onclick = () => {
                state.step = 'anime';
                state.selectedAnime = null;
                state.selectedGender = null;
                state.scores = [0,0,0,0,0];
                state.answers = [];
                render();
            };
            app.appendChild(screen);
        }

        render();
    </script>
</body>
</html>
