<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Solo Leveling | System Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');
        :root { --blue: #00f0ff; --dark: #020617; }

        body { background: var(--dark); color: #fff; font-family: 'Oswald', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* البطاقة (نسخة مطابقة للأنمي) */
        .hunter-card {
            width: 460px; height: 260px; background: #e2e8f0; color: #000;
            border-radius: 8px; margin: 40px 0; padding: 25px;
            display: flex; gap: 20px; border: 3px solid #64748b;
            box-shadow: 0 0 20px rgba(0,240,255,0.2);
            position: relative;
        }
        .pic { width: 120px; height: 160px; background: #94a3b8; border-radius: 4px; }
        .data h3 { margin: 0 0 10px 0; border-bottom: 2px solid #000; padding-bottom: 5px; }

        /* الأرشيف (قائمة الفصول) */
        .archive-list { width: 100%; max-width: 500px; margin-top: 20px; }
        .chapter-item { 
            background: #1e293b; padding: 15px; margin-bottom: 10px;
            border-right: 4px solid var(--blue); cursor: pointer; transition: 0.3s;
        }
        .chapter-item:hover { background: #334155; }
    </style>
</head>
<body>

    <!-- البطاقة -->
    <div class="hunter-card">
        <div class="pic"></div>
        <div class="data">
            <h3>HUNTER LICENSE</h3>
            <p>الرتبة: <strong>S</strong></p>
            <p>الاسم: Sung Jinwoo</p>
            <p>نقاط الخبرة: 000/100</p>
        </div>
    </div>

    <!-- قائمة الفصول -->
    <div class="archive-list">
        <h3 style="color:var(--blue)">أرشيف الفصول المتاحة</h3>
        <div class="chapter-item">الفصل 001: الاستيقاظ</div>
        <div class="chapter-item">الفصل 002: المهمة اليومية</div>
        <div class="chapter-item">الفصل 003: متجر النظام</div>
    </div>

</body>
</html>
