<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #020617; display: flex; justify-content: center; padding-top: 50px; }
        
        .hunter-card {
            width: 450px; 
            height: 250px; 
            background: #e2e8f0; 
            color: #000;
            border-radius: 8px; 
            padding: 20px;
            display: flex; 
            gap: 20px; 
            border: 4px solid #475569;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        
        .pic { 
            width: 100px; 
            height: 140px; 
            background: #94a3b8; 
            border: 2px solid #334155;
            border-radius: 4px;
        }

        .data { flex: 1; text-align: right; font-family: sans-serif; }
        .data h3 { margin: 0 0 10px 0; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="hunter-card">
        <div class="pic"></div>
        <div class="data">
            <h3>HUNTER LICENSE</h3>
            <p>الرتبة: <strong>S</strong></p>
            <p>الاسم: Sung Jinwoo</p>
        </div>
    </div>

</body>
</html>
